<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="blog-post-card">
    
    <img 
      class="post-img"
      src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
      alt="Beautiful mountain landscape"
    >

    <div class="post-content">
      <h2 class="post-title">Exploring Nature</h2>

      <p class="post-excerpt">
        Discover the beauty of mountains, forests, and peaceful landscapes while learning why nature is important for our well-being.
      </p>

      <a href="#" class="read-more">Read More</a>
    </div>

  </div>

</body>
</html>
