<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylized To-Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>My To-Do List</h1>

  <ul class="todo-list">
    
    <li>
      <input type="checkbox" id="task1">
      <label for="task1">Complete HTML practice</label>

      <ul class="sub-item">
        <li>
          <a 
            class="sub-item-link" 
            href="https://developer.mozilla.org/" 
            target="_blank"
          >
            Study HTML Docs
          </a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task2">
      <label for="task2">Learn CSS styling</label>

      <ul class="sub-item">
        <li>
          <a 
            class="sub-item-link" 
            href="https://www.w3schools.com/css/" 
            target="_blank"
          >
            CSS Tutorial
          </a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task3">
      <label for="task3">Practice JavaScript</label>

      <ul class="sub-item">
        <li>
          <a 
            class="sub-item-link" 
            href="https://javascript.info/" 
            target="_blank"
          >
            JavaScript Guide
          </a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task4">
      <label for="task4">Build a portfolio website</label>

      <ul class="sub-item">
        <li>
          <a 
            class="sub-item-link" 
            href="https://github.com/" 
            target="_blank"
          >
            Upload Projects
          </a>
        </li>
      </ul>
    </li>

  </ul>

</body>
</html>
